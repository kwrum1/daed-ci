name: Build daed Source Package (N5000 Optimized)

on:
  workflow_dispatch:
    inputs:
      pkg_version:
        description: '源码包版本号 (例如: 2026.02.27)'
        required: true
        default: '2026.02.27'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🧰 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # 🌟 直接拉满，明确要求使用 1.26 版本
          check-latest: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: 🛠️ Run Pre-build Script
        run: |
          ROOT_DIR="$(pwd)"
          WORK_DIR="$ROOT_DIR/daed_build_temp"
          PKG_VERSION="${{ github.event.inputs.pkg_version }}"

          echo ">>> [1/6] 创建并进入工作区..."
          mkdir -p "$WORK_DIR" && cd "$WORK_DIR"

          echo ">>> [2/6] 拉取主线框架与优化分支..."
          git clone --depth 1 https://github.com/daeuniverse/daed.git .
          rm -rf wing dae-core outbound quic-go
          git clone --depth 1 https://github.com/daeuniverse/dae-wing wing
          git clone --depth 1 -b optimize/code-quality-fixes https://github.com/olicesx/dae dae-core
          cd dae-core && git submodule update --init --recursive && cd ..
          git clone --depth 1 -b perf/complete-optimizations https://github.com/olicesx/outbound outbound
          git clone --depth 1 -b main https://github.com/olicesx/quic-go quic-go

          echo ">>> [3/6] 前端构建与静态资源压缩 (强行越过子包报错)..."
          pnpm install --no-frozen-lockfile
          
          # 策略 A: 使用 --continue 让 turbo 即使遇到 LSP 报错也继续往下构建 Web
          # 加上 || true 防止 GitHub Actions 被这个预期的错误强行中断
          npx turbo run build --filter daed --continue || echo "⚠️ 探测到子包非致命错误，检查产物是否幸存..."
          
          # 检查产物是否成功生成，如果没有，启动终极暴力预案
          if [ ! -f "apps/web/dist/index.html" ]; then
            echo "❌ 常规构建未能生成 Web 产物，启动暴力 Vite 降级打包..."
            cd apps/web
            # 跳过所有外层拦截，直接调用底层的 vite 强行合并输出静态文件
            npx vite build
            cd ../../
          fi
          
          echo ">>> 部署静态资源到后端..."
          mkdir -p wing/webrender/web
          cp -rf apps/web/dist/* wing/webrender/web/
          find wing/webrender/web -type f -size +4k ! -name "*.gz" -exec gzip -9 -k {} \;

          echo ">>> [4/6] 降级 Go 依赖版本防报错..."
          find . -name "go.mod" -exec sed -i 's/^go 1.*/go 1.23.0/g' {} \;
          find . -name "go.mod" -exec sed -i '/^toolchain/d' {} \;

          echo ">>> [5/6] 缝合 Go 语言依赖树..."
          cd wing
          go mod edit -replace github.com/daeuniverse/dae=../dae-core
          go mod edit -replace github.com/daeuniverse/outbound=../outbound
          go mod edit -replace github.com/daeuniverse/quic-go=../quic-go
          
          wget -qO- https://github.com/daeuniverse/dae-wing/commit/157668a.patch | patch -p1 || true
          GOPROXY="https://goproxy.cn,direct" GOSUMDB=off go mod tidy
          cd ..

          echo ">>> [6/6] 打包最终源码产物..."
          tar -czf "$ROOT_DIR/daed-$PKG_VERSION.tar.gz" wing dae-core outbound quic-go
          echo "打包完成：daed-$PKG_VERSION.tar.gz"

      - name: 🚀 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-source-package
          path: daed-*.tar.gz
          retention-days: 7

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-source-latest
          name: "daed 满血优化版源码 (N5000/Go 1.26)"
          body: "包含前端静态资源与 olicesx 优化版核心的预构建源码包。"
          files: daed-*.tar.gz
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
